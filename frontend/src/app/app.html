<header class="navbar">
  <div class="navbar-inner container">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-mark">＋</span> MediRDV
    </a>

    @if (isAuthenticated()) {
      <button
        type="button"
        class="menu-toggle"
        [class.open]="menuOpen()"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Ouvrir le menu"
      >
        <span></span><span></span><span></span>
      </button>

      <nav class="nav-links" [class.open]="menuOpen()">
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          >Prendre RDV</a
        >
        <a routerLink="/my-appointments" routerLinkActive="active" (click)="closeMenu()"
          >Mes rendez-vous</a
        >
        @if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Administration</a>
        }
      </nav>

      <div class="nav-user" [class.open]="menuOpen()">
        <span class="muted">{{ user()?.fullName }}</span>
        <button class="btn btn-ghost btn-sm" (click)="logout()">
          Déconnexion
        </button>
      </div>
    }
  </div>
</header>

<main>
  <router-outlet />
</main>
